<!-- @dsCard group="Type" viewport="700x230" name="Headline lockup" subtitle="The signature move: a Garet word + a Borel accent word." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 26px 28px; background: var(--surface-page); }
  .eyebrow { font-family: var(--font-body); font-weight: 700; letter-spacing: .14em; text-transform: uppercase; font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
  .lockup { display: flex; flex-direction: column; line-height: .92; }
  .lockup .script { font-family: var(--font-script); font-size: 40px; color: var(--text-brand); margin-bottom: -4px; padding-left: 2px; }
  .lockup .heavy { font-family: var(--font-display); font-weight: 900; font-size: 60px; letter-spacing: -.02em; color: var(--text-primary); }
  .alt { margin-top: 22px; font-family: var(--font-display); font-weight: 900; font-size: 34px; color: var(--text-primary); letter-spacing: -.01em; }
  .alt em { font-family: var(--font-script); font-weight: 400; font-style: normal; font-size: 40px; color: var(--text-brand); }
</style>
</head>
<body>
  <div class="eyebrow">Resumen ejecutivo</div>
  <div class="lockup">
    <span class="script">Lo que esta solución</span>
    <span class="heavy">resuelve y habilita</span>
  </div>
  <div class="alt">Cambios <em>que generan</em> valor</div>
</body>
</html>
