<!-- @dsCard group="Colors" viewport="700x190" name="Neutral ramp" subtitle="Warm cream → ink. The whole brand lives here." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 10px; color: var(--ink-900); opacity: .65; }
  .sw.dark span { color: var(--cream-50); }
  .labels { display: flex; gap: 0; margin-top: 8px; }
  .labels div { flex: 1; font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--text-secondary); padding: 0 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--cream-50)"><span>50</span></div>
    <div class="sw" style="background:var(--cream-100)"><span>100</span></div>
    <div class="sw" style="background:var(--cream-200)"><span>200</span></div>
    <div class="sw" style="background:var(--cream-300)"><span>300</span></div>
    <div class="sw" style="background:var(--sand-400)"><span>s400</span></div>
    <div class="sw dark" style="background:var(--warm-gray-500)"><span>g500</span></div>
    <div class="sw dark" style="background:var(--warm-gray-600)"><span>g600</span></div>
    <div class="sw dark" style="background:var(--warm-gray-700)"><span>g700</span></div>
    <div class="sw dark" style="background:var(--ink-800)"><span>800</span></div>
    <div class="sw dark" style="background:var(--ink-900)"><span>900</span></div>
    <div class="sw dark" style="background:var(--ink-950)"><span>950</span></div>
  </div>
  <div class="labels">
    <div>cream</div><div></div><div></div><div></div><div>sand</div>
    <div>warm&nbsp;gray</div><div></div><div></div><div>ink</div><div></div><div></div>
  </div>
</body>
</html>
