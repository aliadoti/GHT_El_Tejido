<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display: flex; gap: 24px; }
  .copy { flex: 1.4; }
  .copy p { margin: 0; font-family: var(--font-body); font-size: 15px; line-height: 1.6; color: var(--text-secondary); }
  .copy p b { color: var(--text-primary); font-weight: 700; }
  .weights { flex: 1; display: flex; flex-direction: column; gap: 3px; justify-content: center; border-left: 1px solid var(--border-subtle); padding-left: 22px; }
  .weights span { font-family: var(--font-body); font-size: 17px; color: var(--text-primary); }
</style>
</head>
<body>
  <div class="copy">
    <p>Desde <b>Aliado TI</b> proponemos un roadmap por fases, orientado a generar resultados visibles, controlar el riesgo de ejecución y construir una solución sostenible en el tiempo.</p>
  </div>
  <div class="weights">
    <span style="font-weight:300">Light 300</span>
    <span style="font-weight:400">Regular 400</span>
    <span style="font-weight:600">Semibold 600</span>
    <span style="font-weight:700">Bold 700</span>
    <span style="font-weight:900">Black 900</span>
  </div>
</body>
</html>
