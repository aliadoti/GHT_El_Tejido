<!-- @dsCard group="Brand" viewport="700x240" name="Logo & lockup" subtitle="The shared blue 'A' mark — shown on its own. Each company brands independently." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); display: flex; flex-direction: column; height: 100vh; }
  .panels { flex: 1; display: flex; }
  .panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 24px; }
  .panel.dark { background: var(--surface-inverse); }
  .mark { height: 84px; width: auto; }
  .clearspace { padding: 18px; border: 1px dashed var(--border-strong); border-radius: var(--radius-md); display: flex; }
  .dark .clearspace { border-color: rgba(255,255,255,.18); }
  .cap { font-family: var(--font-body); font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--text-muted); }
  .dark .cap { color: var(--warm-gray-500); }
  .note { border-top: 1px solid var(--border-subtle); padding: 13px 26px; font-family: var(--font-body); font-size: 12.5px; line-height: 1.5; color: var(--text-secondary); display: flex; align-items: center; gap: 9px; background: var(--surface-card); }
  .note .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand-blue); flex: none; }
  .note b { color: var(--text-primary); font-weight: 700; }
</style>
</head>
<body>
  <div class="panels">
    <div class="panel">
      <div class="clearspace"><img class="mark" src="../../assets/logos/brand-mark.png" alt="Brand mark" /></div>
      <span class="cap">On cream · clear space ≈ cap height</span>
    </div>
    <div class="panel dark">
      <div class="clearspace"><img class="mark" src="../../assets/logos/brand-mark.png" alt="Brand mark" /></div>
      <span class="cap">On ink · keep the gradient, never invert</span>
    </div>
  </div>
  <div class="note"><span class="dot"></span><span>The blue&ndash;indigo <b>&ldquo;A&rdquo;</b> is the shared mark. Each company locks it up with <b>its own Garet wordmark, independently</b> &mdash; never co-brand or place both together.</span></div>
</body>
</html>
