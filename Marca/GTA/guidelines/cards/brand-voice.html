<!-- @dsCard group="Brand" viewport="700x210" name="Voice & tone" subtitle="Spanish, first-person plural, the 'ally' framing. Confident, never salesy." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display: flex; gap: 22px; }
  .quote { flex: 1.5; }
  .quote p { margin: 0; font-family: var(--font-title); font-weight: 400; font-size: 21px; line-height: 1.35; color: var(--text-primary); }
  .quote p em { font-family: var(--font-script); font-style: normal; color: var(--text-brand); }
  .principles { flex: 1; display: flex; flex-direction: column; gap: 9px; justify-content: center; border-left: 1px solid var(--border-subtle); padding-left: 22px; }
  .principles div { font-family: var(--font-body); font-size: 12.5px; color: var(--text-secondary); }
  .principles div b { color: var(--text-primary); font-weight: 700; display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1px; }
</style>
</head>
<body>
  <div class="quote">
    <p>No proponemos únicamente desarrollar funcionalidades. Proponemos ordenar y fortalecer el proceso, para trabajar como un <em>aliado estratégico</em> del cliente.</p>
  </div>
  <div class="principles">
    <div><b>Nosotros</b>First-person plural, never "yo"</div>
    <div><b>Aliado</b>Partner, not vendor</div>
    <div><b>Claro</b>Plain words over jargon</div>
    <div><b>Sin emoji</b>In brand copy</div>
  </div>
</body>
</html>
