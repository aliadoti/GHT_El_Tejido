<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Modular steps from 2xs to 6xl." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-page); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 3px 0; border-bottom: 1px solid var(--border-subtle); }
  .r:last-child { border-bottom: 0; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 84px; flex: none; }
  .ex { font-family: var(--font-display); font-weight: 900; color: var(--text-primary); line-height: 1.05; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="r"><span class="lbl">6xl · 84</span><span class="ex" style="font-size:42px">Aliado</span></div>
  <div class="r"><span class="lbl">4xl · 48</span><span class="ex" style="font-size:38px">Proveedores</span></div>
  <div class="r"><span class="lbl">3xl · 38</span><span class="ex" style="font-size:30px">Roadmap por fases</span></div>
  <div class="r"><span class="lbl">2xl · 30</span><span class="ex" style="font-size:24px">Solución planteada</span></div>
  <div class="r"><span class="lbl">xl · 24</span><span class="ex" style="font-size:20px">Gestión documental y control</span></div>
  <div class="r"><span class="lbl">lg · 20</span><span class="ex" style="font-size:17px; font-family:var(--font-body); font-weight:700">Cálculo automático de ANS</span></div>
  <div class="r"><span class="lbl">base · 16</span><span class="ex" style="font-size:15px; font-family:var(--font-body); font-weight:400; color:var(--text-secondary)">Trazabilidad de estados, responsables y tiempos</span></div>
</body>
</html>
