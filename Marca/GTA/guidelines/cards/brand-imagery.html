<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); display: flex; gap: 14px; }
  .img { flex: 1; height: 164px; border-radius: var(--radius-lg); background-size: cover; background-position: center; box-shadow: var(--shadow-sm); position: relative; overflow: hidden; }
  .img span { position: absolute; left: 12px; bottom: 11px; font-family: var(--font-body); font-weight: 700; font-size: 11px; color: var(--ink-900); background: rgba(251,250,246,.82); padding: 3px 9px; border-radius: var(--radius-pill); backdrop-filter: blur(4px); }
</style>
</head>
<body>
  <div class="img" style="background-image:url(../../assets/imagery/cream-wall-shadow.png)"><span>Soft shadow · texture</span></div>
  <div class="img" style="background-image:url(../../assets/imagery/cream-desk-tea.png)"><span>Still-life · negative space</span></div>
</body>
</html>
