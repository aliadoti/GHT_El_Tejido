<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Restrained, warm-tinted shadows. xs → xl." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px 24px; background: var(--surface-page); display: flex; gap: 26px; align-items: center; justify-content: space-around; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 92px; height: 64px; background: var(--surface-card); border-radius: var(--radius-md); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lbl">xs</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">sm</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lbl">md</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">lg</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lbl">xl</div></div>
</body>
</html>
