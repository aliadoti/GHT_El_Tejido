<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base. From space-1 to space-16." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { border-radius: var(--radius-xs); width: 100%; }
  .col .box { width: 40px; display: flex; flex-direction: column; align-items: center; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .px { font-family: var(--font-body); font-size: 11px; font-weight: 700; color: var(--brand-blue-deep); }
</style>
</head>
<body>
  <div class="col"><div class="box"><div class="bar" style="height:4px; background:var(--brand-cyan)"></div></div><div class="px">4</div><div class="lbl">1</div></div>
  <div class="col"><div class="box"><div class="bar" style="height:8px; background:var(--brand-cyan)"></div></div><div class="px">8</div><div class="lbl">2</div></div>
  <div class="col"><div class="box"><div class="bar" style="height:12px; background:var(--brand-blue)"></div></div><div class="px">12</div><div class="lbl">3</div></div>
  <div class="col"><div class="box"><div class="bar" style="height:16px; background:var(--brand-blue)"></div></div><div class="px">16</div><div class="lbl">4</div></div>
  <div class="col"><div class="box"><div class="bar" style="height:24px; background:var(--brand-blue)"></div></div><div class="px">24</div><div class="lbl">6</div></div>
  <div class="col"><div class="box"><div class="bar" style="height:32px; background:var(--brand-blue-deep)"></div></div><div class="px">32</div><div class="lbl">8</div></div>
  <div class="col"><div class="box"><div class="bar" style="height:48px; background:var(--brand-blue-deep)"></div></div><div class="px">48</div><div class="lbl">12</div></div>
  <div class="col"><div class="box"><div class="bar" style="height:64px; background:var(--brand-indigo)"></div></div><div class="px">64</div><div class="lbl">16</div></div>
</body>
</html>
