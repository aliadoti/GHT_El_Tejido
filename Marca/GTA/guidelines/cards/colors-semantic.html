<!-- @dsCard group="Colors" viewport="700x180" name="Semantic surfaces & text" subtitle="How the ramp maps to surfaces, borders and text roles." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display: flex; gap: 16px; align-items: stretch; }
  .demo { flex: 1.3; background: var(--surface-card); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow-sm); }
  .demo h4 { font-family: var(--font-display); font-weight: 900; font-size: 18px; color: var(--text-primary); margin: 0 0 4px; }
  .demo p { margin: 0 0 8px; font-size: 13px; color: var(--text-secondary); }
  .demo .muted { color: var(--text-muted); font-size: 12px; }
  .inverse { flex: 1; background: var(--surface-inverse); border-radius: var(--radius-lg); padding: 16px 18px; }
  .inverse h4 { font-family: var(--font-display); font-weight: 900; font-size: 18px; color: var(--text-inverse); margin: 0 0 4px; }
  .inverse p { margin: 0; font-size: 13px; color: var(--warm-gray-400); }
  .list { display: flex; flex-direction: column; gap: 6px; flex: .9; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary); justify-content: center; }
  .list span b { color: var(--text-primary); font-weight: 700; }
</style>
</head>
<body>
  <div class="demo">
    <h4>Surface · card</h4>
    <p>text-primary over a card on the page surface.</p>
    <span class="muted">text-muted · supporting detail</span>
  </div>
  <div class="inverse">
    <h4>Inverse</h4>
    <p>text-inverse on surface-inverse.</p>
  </div>
  <div class="list">
    <span><b>page</b> cream-100</span>
    <span><b>card</b> white</span>
    <span><b>sunken</b> cream-200</span>
    <span><b>border</b> sand-400</span>
  </div>
</body>
</html>
