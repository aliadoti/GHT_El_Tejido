<!DOCTYPE html>

<head>

<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; max-width: 640px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Select, Textarea, Checkbox, Switch } = window.AliadoTIDesignSystem_36ceeb;
    function Demo() {
      return (
        <div className="grid">
          <div className="stack">
            <Input label="NIT del proveedor" placeholder="900.123.456-7" hint="Sin dígito de verificación" />
            <Select label="Tipo de persona" placeholder="Selecciona…" options={["Persona natural","Persona jurídica"]} />
            <div style={{ display:"flex", gap:20, marginTop:4 }}>
              <Checkbox label="Acepto términos" defaultChecked />
              <Switch label="Notificar" defaultChecked />
            </div>
          </div>
          <div className="stack">
            <Input label="Correo" defaultValue="proveedor@chia.co" error="Ya existe un proveedor con este correo" />
            <Textarea label="Observaciones" rows={3} placeholder="Devolución selectiva del documento…" />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
