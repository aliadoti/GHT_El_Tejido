  <script type="text/babel">
    const { Alert } = window.AliadoTIDesignSystem_36ceeb;
    const Icon = ({ n }) => <i data-lucide={n}></i>;
    function Demo() {
      return (
        <div className="stack">
          <Alert tone="info" icon={<Icon n="info" />} title="Revisión previa habilitada">
            El formulario pasa por revisión interna antes de enviarse a firma.
          </Alert>
          <Alert tone="success" icon={<Icon n="check-circle" />} title="Documento firmado" onClose={() => {}}>
            DocuSign actualizó el estado automáticamente.
          </Alert>
          <Alert tone="warning" icon={<Icon n="clock" />}>ANS por vencer: 6 horas para responder esta solicitud.</Alert>
          <Alert tone="danger" icon={<Icon n="alert-triangle" />} title="Documento devuelto">
            Cámara de Comercio vencida — el proveedor debe cargarla de nuevo.
          </Alert>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
  </script>
