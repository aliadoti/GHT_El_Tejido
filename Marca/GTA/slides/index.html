<!-- @dsCard group="Slides" viewport="1280x720" name="Deck — full presentation" subtitle="Click-through of all sample slides · ← → to navigate" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Aliado TI · Propuesta — Deck</title>
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #111012; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #canvas { width: 1280px; height: 720px; transform-origin: center center; box-shadow: 0 30px 90px rgba(0,0,0,.5); background: var(--surface-page); }
  #canvas iframe { width: 1280px; height: 720px; border: 0; display: block; }
  .nav { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 14px; background: rgba(28,28,30,.82); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.08); border-radius: 999px; padding: 8px 10px; z-index: 10; }
  .nav button { width: 34px; height: 34px; border-radius: 50%; border: none; background: rgba(255,255,255,.08); color: #f3efe7; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .nav button:hover { background: rgba(255,255,255,.18); }
  .nav .count { font-family: var(--font-body); font-size: 13px; color: #cfcabf; min-width: 54px; text-align: center; letter-spacing: .04em; }
</style>
</head>
<body>
  <div id="stage"><div id="canvas"><iframe id="frame" src="TitleSlide.html"></iframe></div></div>
  <div class="nav">
    <button id="prev" aria-label="Anterior">‹</button>
    <span class="count" id="count">1 / 5</span>
    <button id="next" aria-label="Siguiente">›</button>
  </div>
  <script>
    const slides = ["TitleSlide.html","SectionSlide.html","CapabilitiesSlide.html","RoadmapSlide.html","ClosingSlide.html"];
    const frame = document.getElementById("frame");
    const count = document.getElementById("count");
    const canvas = document.getElementById("canvas");
    let i = Math.min(slides.length - 1, Math.max(0, parseInt(localStorage.getItem("ati_deck_i") || "0", 10)));
    function render() {
      frame.src = slides[i];
      count.textContent = (i + 1) + " / " + slides.length;
      localStorage.setItem("ati_deck_i", String(i));
    }
    function fit() {
      const s = Math.min(window.innerWidth / 1280, window.innerHeight / 720) * 0.92;
      canvas.style.transform = "scale(" + s + ")";
    }
    document.getElementById("next").onclick = () => { i = Math.min(slides.length - 1, i + 1); render(); };
    document.getElementById("prev").onclick = () => { i = Math.max(0, i - 1); render(); };
    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") { i = Math.min(slides.length - 1, i + 1); render(); }
      if (e.key === "ArrowLeft") { i = Math.max(0, i - 1); render(); }
    });
    window.addEventListener("resize", fit);
    fit(); render();
  </script>
</body>
</html>
