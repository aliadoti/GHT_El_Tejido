<!-- @dsCard group="Slides" viewport="1280x720" name="Closing slide" subtitle="Thank-you — photographic background with contact block" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="./slide.css" />
<style>
  body { margin: 0; background: var(--ink-950); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .end { background:
      linear-gradient(90deg, rgba(251,250,246,.97) 0%, rgba(251,250,246,.9) 40%, rgba(251,250,246,.35) 72%, rgba(251,250,246,.08) 100%),
      url(../assets/imagery/cream-desk-tea.png);
    background-size: cover; background-position: center; }
  .end__body { position: absolute; left: 84px; top: 232px; }
  .end .script { font-size: 64px; margin-bottom: 0; padding-left: 4px; }
  .end .heavy { font-size: 118px; }
  .end__contact { position: absolute; left: 86px; bottom: 92px; display: flex; align-items: center; gap: 18px; }
  .end__contact .av { width: 52px; height: 52px; border-radius: 50%; background: var(--gradient-metal); display: flex; align-items: center; justify-content: center; color: var(--cream-50); font-weight: 800; font-family: var(--font-body); font-size: 18px; }
  .end__contact .who { display: flex; flex-direction: column; }
  .end__contact .who b { font-family: var(--font-body); font-weight: 800; font-size: 17px; color: var(--text-primary); }
  .end__contact .who span { font-size: 13px; color: var(--text-secondary); }
  .end__contact .who span.mail { color: var(--metal-dark); font-weight: 600; }
</style>
</head>
<body>
  <div class="slide end">
    <div class="end__body">
      <div class="slide__eyebrow" style="margin-bottom:14px;">Contacto</div>
      <div class="lockup">
        <span class="script">Muchas</span>
        <span class="heavy">gracias</span>
      </div>
    </div>
    <div class="end__contact">
      <div class="av">JP</div>
      <div class="who">
        <b>Jason Pérez C. · Client Partner</b>
        <span class="mail">jason.perez@aliadoti.com</span>
        <span>+57 318 252 7390</span>
      </div>
    </div>
    <div class="slide__footer">
      <div class="slide__brand"><img src="../assets/logos/brand-mark.png" alt="Brand mark" /></div>
      <span>Información Confidencial</span>
    </div>
  </div>
</body>
</html>
