name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release -warnaserror
      - run: dotnet format --verify-no-changes
        # D5: el runner del banco de calibración (Category=Calibracion) llama al LLM real y cuesta
        # dinero; se excluye del CI. El agregador/comparador SÍ corren (mockeados, verde en CI).
      - run: dotnet test --no-build -c Release --collect:"XPlat Code Coverage" --filter "Category!=Calibracion"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: src/ElTejido.Web/package-lock.json
      - working-directory: src/ElTejido.Web
        run: npm ci
      - working-directory: src/ElTejido.Web
        run: npm run lint
      - working-directory: src/ElTejido.Web
        run: npm run test -- --watch=false
      - working-directory: src/ElTejido.Web
        run: npm run build -- --configuration production
